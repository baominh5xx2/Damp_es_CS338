DATALOADER:
  TRAIN_X:
    BATCH_SIZE: 16
    N_DOMAIN: 0
    SAMPLER: RandomSampler
  TRAIN_U:
    BATCH_SIZE: 16
    N_DOMAIN: 0
    SAMPLER: RandomSampler
  TEST:
    BATCH_SIZE: 100
  NUM_WORKERS: 4

DATASET:
  NAME: VOC12
  SOURCE_DOMAINS:
    - train
  TARGET_DOMAINS:
    - trainval

INPUT:
  SIZE:
    - 224
    - 224
  INTERPOLATION: bicubic
  TRANSFORMS:
    - random_resized_crop
    - random_flip
    - normalize

MODEL:
  BACKBONE:
    NAME: ViT-B/16
    PATH: ""

OPTIM:
  NAME: sgd
  LR: 0.002
  MAX_EPOCH: 50
  LR_SCHEDULER: cosine
  WARMUP_EPOCH: 1
  WARMUP_TYPE: linear
  WARMUP_MIN_LR: 1.0e-05

OPTIM_C:
  NAME: sgd
  LR: 0.002
  MAX_EPOCH: 50
  LR_SCHEDULER: cosine
  WARMUP_EPOCH: 1
  WARMUP_TYPE: linear
  WARMUP_MIN_LR: 1.0e-05

TRAIN:
  PRINT_FREQ: 20
  CHECKPOINT_FREQ: 5
  COUNT_ITER: train_x

TEST:
  SPLIT: test
  NO_TEST: false

TRAINER:
  NAME: DAMP
  DAMP:
    N_CTX: 16
    CSC: false
    PREC: amp
    TAU: 0.55
    U: 1.0
    STRONG_TRANSFORMS:
      - random_flip
      - randaugment
      - normalize

SEED: 1
USE_CUDA: true
OUTPUT_DIR: output/damp/voc12
